<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Internal Tools</title>

  <style>
    /* =========================
       Base
    ========================= */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f4f6fa;
      color: #111827;
      line-height: 1.7;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 16px 64px;
    }

    /* =========================
       Header
    ========================= */
    .header {
      margin-bottom: 28px;
      text-align: center;
    }

    .badge {
      display: inline-flex;
      padding: 6px 12px;
      border-radius: 999px;
      background: #e0f2fe;
      color: #075985;
      font-size: 13px;
      font-weight: 800;
      margin-bottom: 14px;
    }

    h1 {
      margin: 0;
      font-size: clamp(30px, 5vw, 46px);
      line-height: 1.15;
      letter-spacing: 0.02em;
    }

    .lead {
      margin: 14px auto 0;
      max-width: 640px;
      color: #6b7280;
      font-size: 15px;
    }

    /* =========================
       Search
    ========================= */
    .search-area {
      margin: 28px 0 22px;
    }

    .search-input {
      width: 100%;
      min-height: 48px;
      padding: 12px 16px;
      border: 1px solid #d1d5db;
      border-radius: 999px;
      background: #fff;
      font-size: 15px;
      outline: none;
    }

    .search-input:focus {
      border-color: #111827;
      box-shadow: 0 0 0 4px rgba(17, 24, 39, 0.08);
    }

    /* =========================
       Tool Buttons
    ========================= */
    .tools-list {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
    }

    .tool-button {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      width: 100%;
      min-height: 68px;
      padding: 18px 22px;
      border-radius: 18px;
      background: #fff;
      border: 1px solid #e5e7eb;
      box-shadow: 0 10px 28px rgba(15, 23, 42, 0.06);
      font-size: 18px;
      font-weight: 800;
      transition: 0.2s ease;
    }

    .tool-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.1);
      border-color: #111827;
    }

    .tool-title {
      text-align: left;
    }

    .tool-arrow {
      flex: 0 0 auto;
      width: 34px;
      height: 34px;
      display: grid;
      place-items: center;
      border-radius: 999px;
      background: #111827;
      color: #fff;
      font-size: 18px;
    }

    .empty {
      display: none;
      margin-top: 20px;
      padding: 24px;
      text-align: center;
      color: #6b7280;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 16px;
    }

    /* =========================
       Footer Help
    ========================= */
    .help {
      margin-top: 36px;
      padding: 20px;
      border-radius: 18px;
      background: #111827;
      color: #e5e7eb;
      font-size: 14px;
    }

    .help p {
      margin: 0 0 10px;
      color: #cbd5e1;
    }

    .help code {
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
    }

    .help pre {
      overflow-x: auto;
      margin: 12px 0 0;
      padding: 14px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.08);
      color: #fff;
      font-size: 13px;
    }

    @media (max-width: 640px) {
      .page {
        padding-top: 28px;
      }

      .tool-button {
        min-height: 62px;
        padding: 16px 18px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <header class="header">
      <div class="badge">Internal Tools</div>
      <h1>Tools 一覧</h1>
      <p class="lead">
        内部で使うツールへのリンク集です。ボタンを押すと各ツールを開けます。
      </p>
    </header>

    <section class="search-area">
      <input
        type="search"
        id="searchInput"
        class="search-input"
        placeholder="ツール名で検索"
      />
    </section>

    <section class="tools-list" id="toolsList"></section>

    <div class="empty" id="emptyMessage">
      一致するツールがありません。
    </div>

    <section class="help">
      <p>
        ツールを追加・変更する場合は、<code>tools-config.js</code> だけ編集します。
      </p>

      <pre><code>{
  title: "画像サイズ調整ツール",
  url: "./image-resizer.html"
}</code></pre>
    </section>
  </main>

  <script src="./tools-config.js"></script>

  <script>
    /* =========================
       Internal Tools Page
    ========================= */

    const tools = Array.isArray(window.TOOLS_CONFIG)
      ? window.TOOLS_CONFIG
      : [];

    const toolsList = document.getElementById("toolsList");
    const searchInput = document.getElementById("searchInput");
    const emptyMessage = document.getElementById("emptyMessage");

    renderTools(tools);

    searchInput.addEventListener("input", () => {
      const keyword = searchInput.value.trim().toLowerCase();

      const filteredTools = tools.filter(tool => {
        return String(tool.title || "")
          .toLowerCase()
          .includes(keyword);
      });

      renderTools(filteredTools);
    });

    function renderTools(toolList) {
      toolsList.innerHTML = "";

      if (toolList.length === 0) {
        emptyMessage.style.display = "block";
        return;
      }

      emptyMessage.style.display = "none";

      toolList.forEach(tool => {
        const link = document.createElement("a");
        link.className = "tool-button";
        link.href = tool.url || "#";

        link.innerHTML = `
          <span class="tool-title">${escapeHtml(tool.title)}</span>
          <span class="tool-arrow">→</span>
        `;

        toolsList.appendChild(link);
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll('"', "&quot;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }
  </script>
</body>
</html>
