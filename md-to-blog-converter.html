    function insertSample() {
      mdInput.value = `# 第1章 情報セキュリティって何？なぜ私たちに必要なのか

## はじめに

「情報セキュリティ」という言葉を聞くと、多くの人は次のようなイメージを持つかもしれません。

* IT担当者がやるもの
* 大企業だけに必要なもの
* ハッカー対策のこと
* 自分には関係ないもの

しかし実際には、情報セキュリティはインターネットを利用するすべての人に関係があります。

スマートフォンでSNSを見る。
ネットショッピングを利用する。
ネットバンキングを使う。
メールを送受信する。

私たちは日常生活の中で、たくさんの情報を扱っています。

もしそれらの情報が盗まれたり、不正利用されたりしたらどうなるでしょうか。

クレジットカードが勝手に使われるかもしれません。
SNSアカウントが乗っ取られるかもしれません。
大切な写真やデータが失われるかもしれません。

情報セキュリティとは、このような被害から情報やサービスを守るための考え方や取り組みのことです。

今回は、情報セキュリティの基本について分かりやすく解説します。

---

## 情報セキュリティとは？

情報セキュリティとは、

**「大切な情報を安全に守ること」**

です。

例えば次のような情報があります。

* 氏名
* 住所
* 電話番号
* メールアドレス
* クレジットカード情報
* パスワード
* 写真や動画
* 会社の顧客情報

これらは私たちにとって大切な情報です。

情報セキュリティは単に「情報を隠すこと」ではありません。

必要な人が、必要なときに、正しく利用できる状態を維持することも重要です。

---

## 情報セキュリティの3つの基本

情報セキュリティには有名な3つの考え方があります。

### 1. 機密性（Confidentiality）

許可された人だけが情報を見られる状態です。

例えば、

* パスワードを設定する
* ログイン認証を行う
* ファイルを暗号化する

などが該当します。

もし機密性が守られなければ、他人に個人情報を盗み見られる可能性があります。

---

### 2. 完全性（Integrity）

情報が勝手に変更されていない状態です。

例えば、

* 銀行の残高
* 契約書
* 成績データ

などが改ざんされてしまうと大きな問題になります。

正しい情報が維持されていることが重要です。

---

### 3. 可用性（Availability）

必要なときに利用できる状態です。

例えば、

* ネットバンキング
* オンラインショップ
* メールサービス

が突然使えなくなると困ります。

情報を守るだけでなく、必要なときに利用できることも情報セキュリティの重要な要素です。

---

## なぜ情報セキュリティが必要なのか

昔は情報の多くが紙で管理されていました。

しかし現在は、

* スマートフォン
* クラウドサービス
* SNS
* オンライン決済

などが普及し、私たちの生活はインターネットと密接につながっています。

便利になった一方で、犯罪者もインターネットを利用するようになりました。

そのため、

「自分の情報を守る」

という意識がこれまで以上に重要になっています。

---

## 実際に起きている被害

情報セキュリティの問題はニュースの中だけの話ではありません。

身近なところでも数多く発生しています。

### フィッシング詐欺

宅配業者や銀行を装ったメールが届きます。

利用者が偽サイトにアクセスし、IDやパスワードを入力してしまうことで情報が盗まれます。

---

### SNSアカウントの乗っ取り

同じパスワードを使い回していると、別のサービスから流出した情報を利用されることがあります。

乗っ取られたアカウントから詐欺メッセージが送信されるケースもあります。

---

### クレジットカードの不正利用

カード情報が漏えいすると、知らないうちに高額な買い物をされる場合があります。

利用明細を見て初めて気付くケースも少なくありません。

---

### ランサムウェア

パソコンのデータが暗号化され、

「元に戻したければお金を払え」

と要求される攻撃です。

近年は企業だけでなく、個人も被害に遭う可能性があります。

---

## 「自分は大丈夫」が一番危険

多くの被害者は、

「まさか自分が狙われるとは思わなかった」

と言います。

しかし犯罪者は特定の人を狙うだけではありません。

大量のメールを送信し、引っかかった人を攻撃します。

つまり、

* 有名人ではない
* お金持ちではない
* ITに詳しくない

という理由では守られません。

むしろ知識が少ない人ほど狙われやすい傾向があります。

---

## 情報セキュリティは難しいものではない

情報セキュリティというと専門的で難しく感じるかもしれません。

しかし最初から高度な知識は必要ありません。

例えば、

* パスワードを使い回さない
* 怪しいメールを開かない
* ソフトウェアを更新する
* 不審なサイトを利用しない

といった基本的な対策だけでも、多くの被害を防ぐことができます。

大切なのは完璧を目指すことではなく、正しい知識を少しずつ身につけることです。

---

## まとめ

今回は情報セキュリティの基本について解説しました。

ポイントを振り返りましょう。

* 情報セキュリティとは大切な情報を守ること
* 機密性・完全性・可用性の3つが基本
* インターネット利用者全員に関係がある
* フィッシング詐欺やアカウント乗っ取りは身近な脅威
* 「自分は大丈夫」という考えが危険
* 基本的な対策だけでも被害を大きく減らせる

次回は、

**「第2章 あなたの情報はどこにある？個人情報について知ろう」**

をテーマに、私たちが普段どのような情報を扱っているのかを解説します。`;

      autoFillArticleSettings(true);
      convert();
    }

    function clearAll() {
      mdInput.value = "";
      htmlOutput.textContent = "";
      jsonOutput.textContent = "";
      previewFrame.srcdoc = "";

      fields.blogId.value = "blog100001";
      fields.blogTitle.value = "";
      fields.blogDescription.value = "";
      fields.blogOgDescription.value = "";
      fields.blogHeroLead.value = "";
      fields.blogCategory.value = "";
      fields.blogDate.value = getTodayDate();
      fields.readingTime.value = "";
      fields.blogFile.value = "";
      fields.ogImage.value = "https://www.zerquor.com/images/blog/security-basic.png";
      fields.breadcrumbTitle.value = "";
      fields.nextTitle.value = "";
      fields.nextFile.value = "";
      fields.assetVersion.value = "20260616-10";
    }

    function convert() {
      const markdown = mdInput.value.trim();

      if (!markdown) {
        alert("Markdownを入力してください。");
        return;
      }

      const parsedMarkdown = parseMarkdown(markdown);
      const meta = getMeta();

      const bodyHtml = convertMarkdownBodyToArticleSections(parsedMarkdown.body);
      const pageHtml = buildPageHtml(meta, bodyHtml);
      const json = buildJson(meta);

      htmlOutput.textContent = pageHtml;
      jsonOutput.textContent = json;
      previewFrame.srcdoc = pageHtml;
    }

    function getMeta() {
      return {
        id: fields.blogId.value.trim() || "blog100001",
        title: fields.blogTitle.value.trim(),
        description: fields.blogDescription.value.trim(),
        ogDescription: fields.blogOgDescription.value.trim(),
        heroLead: fields.blogHeroLead.value.trim(),
        category: fields.blogCategory.value.trim() || "ブログ",
        date: fields.blogDate.value.trim() || getTodayDate(),
        readingTime: fields.readingTime.value.trim() || "約1分",
        file: fields.blogFile.value.trim(),
        ogImage: fields.ogImage.value.trim() || "https://www.zerquor.com/images/logo.png",
        breadcrumbTitle: fields.breadcrumbTitle.value.trim(),
        nextTitle: fields.nextTitle.value.trim(),
        nextFile: fields.nextFile.value.trim(),
        assetVersion: fields.assetVersion.value.trim() || "20260616-10"
      };
    }

    function autoFillArticleSettings(overwrite) {
      const markdown = mdInput.value.trim();

      if (!markdown) return;

      const parsed = parseMarkdown(markdown);
      const title = parsed.title || extractTitleFromMarkdown(markdown);

      if (!title) return;

      const plainText = markdownToPlainText(parsed.body);
      const description = createDescription(title, plainText);
      const shortDescription = createShortDescription(description);
      const heroLead = createHeroLead(description);
      const category = guessCategory(title, plainText);
      const readingTime = calculateReadingTime(markdown);
      const breadcrumbTitle = createBreadcrumbTitle(title);
      const nextTitle = extractNextTitle(markdown);
      const id = fields.blogId.value.trim() || "blog100001";
      const file = createFileName(id, title);

      setFieldValue(fields.blogTitle, title, overwrite);
      setFieldValue(fields.blogDescription, description, overwrite);
      setFieldValue(fields.blogOgDescription, shortDescription, overwrite);
      setFieldValue(fields.blogHeroLead, heroLead, overwrite);
      setFieldValue(fields.blogCategory, category, overwrite);
      setFieldValue(fields.readingTime, readingTime, overwrite);
      setFieldValue(fields.breadcrumbTitle, breadcrumbTitle, overwrite);
      setFieldValue(fields.blogFile, file, overwrite);

      if (!fields.blogDate.value) {
        fields.blogDate.value = getTodayDate();
      }

      if (!fields.blogId.value.trim()) {
        fields.blogId.value = "blog100001";
      }

      if (nextTitle) {
        setFieldValue(fields.nextTitle, nextTitle, overwrite);

        const nextId = incrementBlogId(id);
        const nextFile = createFileName(nextId, nextTitle);

        setFieldValue(fields.nextFile, nextFile, overwrite);
      }
    }

    function setFieldValue(field, value, overwrite) {
      if (!value) return;

      if (overwrite || !field.value.trim()) {
        field.value = value;
      }
    }

    function parseMarkdown(markdown) {
      let body = markdown.trim();
      let title = "";

      const firstH1 = body.match(/^#\s+(.+)$/m);

      if (firstH1) {
        title = firstH1[1].trim();
        body = body.replace(firstH1[0], "").trim();
      }

      return {
        title,
        body
      };
    }

    function extractTitleFromMarkdown(markdown) {
      const match = markdown.match(/^#\s+(.+)$/m);
      return match ? match[1].trim() : "";
    }

    function markdownToPlainText(markdown) {
      return markdown
        .replace(/^---[\s\S]*?---/m, "")
        .replace(/```[\s\S]*?```/g, "")
        .replace(/^#{1,6}\s+/gm, "")
        .replace(/^[-*+]\s+/gm, "")
        .replace(/^\d+\.\s+/gm, "")
        .replace(/\*\*(.*?)\*\*/g, "$1")
        .replace(/\*(.*?)\*/g, "$1")
        .replace(/`(.*?)`/g, "$1")
        .replace(/\[(.*?)\]\(.*?\)/g, "$1")
        .replace(/^---$/gm, "")
        .replace(/\n{2,}/g, "\n")
        .trim();
    }

    function createDescription(title, plainText) {
      const cleanTitle = title.replace(/^第\d+章\s*/, "").trim();

      const text = plainText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .filter(line => !line.startsWith("次回は"))
        .join(" ");

      const shortText = truncateText(text, 90);

      if (cleanTitle.includes("情報セキュリティ")) {
        return "情報セキュリティの基本を初心者向けに解説。機密性・完全性・可用性の3要素や、フィッシング詐欺、SNS乗っ取りなど身近な脅威について学びます。";
      }

      if (cleanTitle.includes("個人情報")) {
        return "個人情報の基本を初心者向けに解説。日常生活やインターネット上で扱う情報の種類と注意点について学びます。";
      }

      if (cleanTitle.includes("パスワード")) {
        return "パスワード管理の基本を初心者向けに解説。使い回しの危険性や安全な管理方法について学びます。";
      }

      if (cleanTitle.includes("フィッシング")) {
        return "フィッシング詐欺の基本を初心者向けに解説。偽メールや偽サイトの見分け方、被害を防ぐための注意点を学びます。";
      }

      if (cleanTitle.includes("多要素認証") || cleanTitle.includes("二要素認証")) {
        return "多要素認証の基本を初心者向けに解説。パスワードだけに頼らず、アカウントを安全に守る方法を学びます。";
      }

      return `${cleanTitle}について初心者向けに解説。${shortText}`;
    }

    function createShortDescription(description) {
      return truncateText(description, 55);
    }

    function createHeroLead(description) {
      return truncateText(description, 85);
    }

    function guessCategory(title, plainText) {
      const text = `${title} ${plainText}`;

      if (
        text.includes("情報セキュリティ") ||
        text.includes("個人情報") ||
        text.includes("パスワード") ||
        text.includes("フィッシング") ||
        text.includes("SNS") ||
        text.includes("ランサムウェア") ||
        text.includes("多要素認証") ||
        text.includes("二要素認証")
      ) {
        return "セキュリティリテラシ";
      }

      if (
        text.includes("AI") ||
        text.includes("生成AI") ||
        text.includes("ChatGPT")
      ) {
        return "AI";
      }

      if (
        text.includes("研修") ||
        text.includes("教育") ||
        text.includes("講座")
      ) {
        return "セキュリティ教育";
      }

      return "ブログ";
    }

    function calculateReadingTime(markdown) {
      const plainText = markdownToPlainText(markdown);
      const charCount = plainText.length;

      const minutes = Math.max(1, Math.ceil(charCount / 600));

      return `約${minutes}分`;
    }

    function createBreadcrumbTitle(title) {
      const firstPart = title.split("なぜ")[0].trim();

      if (firstPart.length <= 28) {
        return firstPart;
      }

      return truncateText(title, 28);
    }

    function extractNextTitle(markdown) {
      const match = markdown.match(/次回は[\s\S]{0,120}?「([^」]+)」/);

      if (match) {
        return match[1].trim();
      }

      const boldMatch = markdown.match(/次回は[\s\S]{0,120}?\*\*「([^」]+)」\*\*/);

      if (boldMatch) {
        return boldMatch[1].trim();
      }

      return "";
    }

    function createFileName(id, title) {
      const slug = createSlugFromJapaneseTitle(title);
      return `${id}-${slug}.html`;
    }

    function createSlugFromJapaneseTitle(title) {
      const text = title.toLowerCase();

      if (text.includes("情報セキュリティ") && text.includes("何")) {
        return "security-what-is";
      }

      if (text.includes("個人情報")) {
        return "personal-information";
      }

      if (text.includes("パスワード")) {
        return "password";
      }

      if (text.includes("フィッシング")) {
        return "phishing";
      }

      if (text.includes("sns")) {
        return "sns-security";
      }

      if (text.includes("ランサムウェア")) {
        return "ransomware";
      }

      if (text.includes("多要素認証") || text.includes("二要素認証")) {
        return "mfa";
      }

      if (text.includes("メール")) {
        return "email-security";
      }

      if (text.includes("スマートフォン") || text.includes("スマホ")) {
        return "smartphone-security";
      }

      return "article";
    }

    function incrementBlogId(id) {
      const match = id.match(/^([a-zA-Z]+)(\d+)$/);

      if (!match) {
        return "blog100002";
      }

      const prefix = match[1];
      const numberText = match[2];
      const nextNumber = String(Number(numberText) + 1).padStart(numberText.length, "0");

      return `${prefix}${nextNumber}`;
    }

    function convertMarkdownBodyToArticleSections(markdown) {
      marked.setOptions({
        gfm: true,
        breaks: true
      });

      const tokens = marked.lexer(markdown);
      let html = "";
      let buffer = [];
      let sectionOpen = false;

      function openSectionWithH2(text) {
        if (sectionOpen) {
          flushBuffer();
          html += `\n          </section>\n\n`;
        }

        html += `          <section>\n`;
        html += `            <h2>${escapeHtml(text)}</h2>\n`;

        sectionOpen = true;
      }

      function openSectionIfNeeded() {
        if (!sectionOpen) {
          html += `          <section>\n`;
          sectionOpen = true;
        }
      }

      function flushBuffer() {
        if (!buffer.length) return;

        const rendered = marked.parser(buffer).trim();

        if (rendered) {
          html += indentHtml(rendered, 12) + "\n";
        }

        buffer = [];
      }

      tokens.forEach(token => {
        if (token.type === "space") {
          return;
        }

        if (token.type === "hr") {
          return;
        }

        if (token.type === "heading" && token.depth === 2) {
          openSectionWithH2(token.text);
          return;
        }

        openSectionIfNeeded();
        buffer.push(token);
      });

      flushBuffer();

      if (sectionOpen) {
        html += `\n          </section>`;
      }

      return DOMPurify.sanitize(html, {
        USE_PROFILES: {
          html: true
        }
      });
    }

    function buildNextChapterHtml(meta) {
      if (!meta.nextTitle || !meta.nextFile) {
        return "";
      }

      return `

        <section class="next-chapter">
          <h3>次の記事</h3>

          <a href="${escapeHtml(meta.nextFile)}">
            ${escapeHtml(meta.nextTitle)}
          </a>
        </section>
`;
    }

    function buildJson(meta) {
      const item = {
        id: meta.id,
        title: meta.title,
        description: meta.description,
        category: meta.category,
        date: meta.date,
        readingTime: meta.readingTime,
        file: meta.file
      };

      return JSON.stringify([item], null, 2);
    }

    function formatHeroTitle(title) {
      const safeTitle = escapeHtml(title);

      if (safeTitle.includes("？なぜ")) {
        return safeTitle.replace("？なぜ", "？<br>\n          なぜ");
      }

      if (safeTitle.includes("?なぜ")) {
        return safeTitle.replace("?なぜ", "?<br>\n          なぜ");
      }

      return safeTitle;
    }

    function formatDate(dateText) {
      if (!dateText) return "";

      const parts = dateText.split("-");

      if (parts.length === 3) {
        return `${parts[0]}/${parts[1]}/${parts[2]}`;
      }

      return dateText;
    }

    function getTodayDate() {
      const today = new Date();

      const year = today.getFullYear();
      const month = String(today.getMonth() + 1).padStart(2, "0");
      const day = String(today.getDate()).padStart(2, "0");

      return `${year}-${month}-${day}`;
    }

    function truncateText(text, maxLength) {
      const cleanText = String(text || "")
        .replace(/\s+/g, " ")
        .trim();

      if (cleanText.length <= maxLength) {
        return cleanText;
      }

      return cleanText.slice(0, maxLength) + "。";
    }

    function indentHtml(html, spaces) {
      const padding = " ".repeat(spaces);

      return html
        .split("\n")
        .map(line => line.trim() ? padding + line : "")
        .join("\n");
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    async function copyText(text, message) {
      if (!text.trim()) {
        alert("先に変換してください。");
        return;
      }

      try {
        await navigator.clipboard.writeText(text);
        alert(message);
      } catch (error) {
        fallbackCopyText(text);
        alert(message);
      }
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      document.body.removeChild(textarea);
    }

    function downloadHtml() {
      const html = htmlOutput.textContent.trim();

      if (!html) {
        alert("先に変換してください。");
        return;
      }

      const fileName = fields.blogFile.value.trim() || "blog.html";

      downloadFile(html, fileName, "text/html;charset=utf-8");
    }

    function downloadJson() {
      const json = jsonOutput.textContent.trim();

      if (!json) {
        alert("先に変換してください。");
        return;
      }

      downloadFile(json, "blog-item.json", "application/json;charset=utf-8");
    }

    function downloadFile(content, fileName, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);

      const a = document.createElement("a");
      a.href = url;
      a.download = fileName;
      a.click();

      URL.revokeObjectURL(url);
    }
  </script>
